<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Task Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="auth-page">

<div class="edit-card">
    <div class="card shadow border-danger">
        <div class="card-body p-5 text-center">
            <h1 class="display-4 text-danger mb-4">Oops!</h1>
            <h3 class="card-title mb-3">Something went wrong</h3>
            <p class="card-text text-muted mb-4" th:text="${errorMessage}">Error message details here.</p>
            <div class="d-grid gap-2 col-md-8 mx-auto">
                <a th:href="@{/tasks}" class="btn btn-primary btn-lg shadow-sm">Back to My Tasks</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
