<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Task Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/styles.css}">
    <!-- CSRF Token for AJAX -->
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Task Manager</a>
        <div class="d-flex">
            <span class="navbar-text me-3" th:text="'Logged in as: ' + ${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <!-- Task List -->
        <div class="col-md-8">
            <h2 class="mb-4">My Tasks</h2>
            <div id="taskList">
                <div th:each="task : ${tasks}" th:id="'task-' + ${task.id}" 
                     class="card mb-3 task-card" th:classappend="'priority-' + ${task.priority}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="card-title" th:text="${task.title}"></h5>
                                <p class="card-text text-muted" th:text="${task.description}"></p>
                                <span class="badge rounded-pill bg-info text-dark" th:text="${task.status}"></span>
                                <span class="badge rounded-pill" 
                                      th:classappend="${task.priority == T(com.lucc.taskmanager.model.Priority).HIGH ? 'bg-danger' : (task.priority == T(com.lucc.taskmanager.model.Priority).MEDIUM ? 'bg-warning text-dark' : 'bg-success')}"
                                      th:text="${task.priority}"></span>
                            </div>
                            <div class="btn-group">
                                <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
                                <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteTask(' + ${task.id} + ')'">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(tasks)}" id="noTasksMessage" class="alert alert-info">
                No tasks found! Start by adding one.
            </div>
        </div>

        <!-- Add Task Form -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-3">Add New Task</h4>
                    <form th:action="@{/tasks/add}" th:object="${newTask}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'" required placeholder="What needs to be done?">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea th:field="*{description}" class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'" rows="3" placeholder="Add details..."></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select th:field="*{status}" class="form-select">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select th:field="*{priority}" class="form-select">
                                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Task</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function deleteTask(taskId) {
        if (!confirm('Are you sure you want to delete this task?')) return;

        const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        try {
            const response = await fetch(`/api/tasks/${taskId}`, {
                method: 'DELETE',
                headers: {
                    [header]: token
                }
            });

            if (response.ok) {
                const taskElement = document.getElementById(`task-${taskId}`);
                taskElement.style.opacity = '0';
                setTimeout(() => {
                    taskElement.remove();
                    if (document.querySelectorAll('.task-card').length === 0) {
                        location.reload(); // Show "No tasks" message
                    }
                }, 300);
            } else {
                alert('Failed to delete task.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred while deleting the task.');
        }
    }
</script>
</body>
</html>
